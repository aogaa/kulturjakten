<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ledertavle – Kultur- og historiejakt</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="topp">
    <a class="topp-logo" href="index.html">
      <img src="assets/img/ui/vafs-logo.png" alt="Vestre Aker Frivilligsentral" />
    </a>
    <a class="topp-org" href="https://frivilligsentralen.org/om-oss.html" target="_blank" rel="noopener">Stiftelsen Vestre Aker Frivilligsentral</a>
    <h1>Ledertavle</h1>
    <p><a href="index.html">← Tilbake til kart og forside</a></p>
  </header>

  <main class="innhold">
    <section class="kort">
      <h2>Stillingen</h2>
      <p class="dempet">Velg klasse for å filtrere.</p>

      <div class="filter" id="filter">
        <button data-klasse="Alle" class="aktiv">Alle</button>
        <button data-klasse="Barn">Barn</button>
        <button data-klasse="Voksen">Voksen</button>
        <button data-klasse="Senior">Senior</button>
      </div>

      <div id="ledertavle-innhold">
        <p class="dempet">Laster ledertavla …</p>
      </div>
    </section>
  </main>

  <footer class="bunn">
    <p>© <a href="https://frivilligsentralen.org/om-oss.html" target="_blank" rel="noopener">Stiftelsen Vestre Aker Frivilligsentral</a></p>
  </footer>

  <script type="module">
    import { hentLedertavle } from "./assets/js/ledertavle.js";
    import { FIREBASE_KONFIGURERT } from "./assets/js/firebase-config.js";
    import { erUpassende } from "./assets/js/forbudteord.js";

    const innhold = document.getElementById("ledertavle-innhold");
    const filter = document.getElementById("filter");
    let alleRader = [];
    let aktivKlasse = "Alle";

    function escapeHtml(t) {
      const d = document.createElement("div");
      d.textContent = t;
      return d.innerHTML;
    }

    function tegn() {
      const rader = aktivKlasse === "Alle"
        ? alleRader
        : alleRader.filter((r) => r.klasse === aktivKlasse);

      if (!FIREBASE_KONFIGURERT) {
        innhold.innerHTML =
          '<p class="dempet">Ledertavla er ikke koblet til Firebase ennå. ' +
          'Lim inn Firebase-config i <code>assets/js/firebase-config.js</code> for å se resultater.</p>';
        return;
      }
      if (rader.length === 0) {
        innhold.innerHTML = '<p class="dempet">Ingen deltakere i denne klassen ennå.</p>';
        return;
      }

      const rekker = rader.map((r, i) => {
        // Lag 2: masker navn som slipper gjennom inntastingsfilteret.
        const visningsnavn = erUpassende(r.kallenavn)
          ? '<span class="dempet">(skjult navn)</span>'
          : escapeHtml(r.kallenavn);
        return `
        <tr>
          <td class="plass">${i + 1}</td>
          <td>${visningsnavn}</td>
          <td>${escapeHtml(r.klasse)}</td>
          <td class="poeng">${r.poeng}</td>
        </tr>`;
      }).join("");

      innhold.innerHTML = `
        <table>
          <thead>
            <tr><th>#</th><th>Kallenavn</th><th>Klasse</th><th>Poeng</th></tr>
          </thead>
          <tbody>${rekker}</tbody>
        </table>`;
    }

    filter.addEventListener("click", (e) => {
      const knapp = e.target.closest("button");
      if (!knapp) return;
      aktivKlasse = knapp.dataset.klasse;
      filter.querySelectorAll("button").forEach((b) => b.classList.toggle("aktiv", b === knapp));
      tegn();
    });

    try {
      alleRader = await hentLedertavle();
    } catch (err) {
      console.warn("[ledertavle] Klarte ikke å hente data:", err);
    }
    tegn();
  </script>
</body>
</html>
